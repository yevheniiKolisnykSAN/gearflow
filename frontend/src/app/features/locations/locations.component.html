<div class="component-container">
  <h1 class="title">Locations</h1>

  <p-table [value]="locations()" size="small" [loading]="loading()">
    <ng-template #caption>
      <div class="export-buttons">
        <p-button icon="pi pi-file-export" label="CSV" size="small" severity="secondary" (onClick)="exportCsv()" />
        <p-button icon="pi pi-file-pdf" label="PDF" size="small" severity="secondary" (onClick)="exportPdf()" />
      </div>
    </ng-template>
    <ng-template #header>
      <tr>
        <th>Name</th>
        <th>
          <div class="create-container">
            <p-button label="Create" icon="pi pi-plus" size="small" iconPos="right"
                      (onClick)="popover.toggle($event)" />
            <p-popover #popover (onHide)="createFormControl.reset()">
              <div class="popover-container">
                <app-form-input type="text" placeholder="Name" [formControl]="createFormControl" />
                <p-button severity="success" icon="pi pi-save" size="small" label="Save" iconPos="right"
                          (onClick)="create(popover)" />
              </div>
            </p-popover>
          </div>
        </th>
      </tr>
    </ng-template>
    <ng-template #body let-location>
      <tr>
        <td>
          @if (location.isEditing) {
            <app-form-input type="text" [formControl]="location.editControl!" />
          } @else {
            {{ location.name }}
          }
        </td>
        <td class="actions">
          <div>
            @if (location.isEditing) {
              <p-button severity="success" icon="pi pi-check" size="small"
                        (onClick)="saveEditing(location)" />
              <p-button severity="danger" icon="pi pi-times" size="small"
                        (onClick)="toggleEditing(location.id, false)" />
            } @else {
              <p-button icon="pi pi-pencil" size="small" (onClick)="toggleEditing(location.id, true)" />
            }
            <p-button icon="pi pi-trash" severity="danger" size="small" (onClick)="onDelete(location)" />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td class="empty-row" colspan="8">No data.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
