<div class="component-container">
  <h1 class="title">Pending reservations</h1>

  <p-table [value]="reservations()" size="small" [loading]="loading()">
    <ng-template #caption>
      <div class="export-buttons">
        <p-button icon="pi pi-file-export" label="CSV" size="small" severity="secondary" (onClick)="exportCsv()" />
        <p-button icon="pi pi-file-pdf" label="PDF" size="small" severity="secondary" (onClick)="exportPdf()" />
      </div>
    </ng-template>
    <ng-template #header>
      <tr>
        <th>Equipment name</th>
        <th>Made by</th>
        <th>Sent at</th>
        <th>Defect comment</th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template #body let-reservation>
      <tr>
        <td>{{ reservation.equipment.name }}</td>
        <td>{{ reservation.user.fullName }}</td>
        <td>{{ reservation.pendingAt | date : 'dd-MM-yyyy' }}</td>
        <td>
          <textarea
            #textarea
            class="resize-none"
            pTextarea
            placeholder="(Optional)"
            [value]="reservation?.defect?.comment"
            rows="4"
          ></textarea>
        </td>
        <td class="actions">
          <p-button
            class="reserve-btn"
            label="Confirm"
            severity="success"
            size="small" (onClick)="confirm(reservation, textarea.value)" />
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td class="empty-row" colspan="8">No data.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
